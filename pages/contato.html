<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/colors.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contato.css">
    <title>Contato</title>
</head>

<body>
    <header class="nav-bar">
        <img src="../assets/logo-ford-256.png" alt="Logo Da Ford">
        <nav>
            <ul class="nav-item">
                <li class="nav-content"><a href="../index.html">Home</a></li>
                <li class="nav-content"><a href="lancamento.html">Lançamentos</a></li>
                <li class="nav-contato"><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form class="form">
            <div class="form-content">
                <img src="../assets/xls_2.2_diesel-removebg-preview.png" alt="Imagem do carro">
            <div class="campos">
                    <label class="lblForm">Sobre Você</label>

                    <input type="text" class="inputForm" placeholder="NOME*">
                    <input type="text" class="inputForm" placeholder="SOBRENOME*">
                    <input type="email" class="inputForm" placeholder="EMAIL*">
                    <input type="text" class="inputForm" placeholder="CPF*">
                    <input type="tel" class="inputForm" placeholder="TELEFONE*">

                    <select>
                        <option class="select-main">Tipo de Contato</option>
                        <option class="select-main">Elogio</option>
                        <option class="select-main">Reclamação</option>
                        <option class="select-main">Solicitação</option>
                    </select>

                    <button class="btnForm">Enviar</button>
                </div>

            </div>
        </form>
    </main>
    <footer>
        <div class="footer">

            <div class="footer-redes">
                <p>Redes Sociais</p>

                <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR">
                    <img src="../assets/facebook.png" alt="Facebook">
                </a>

                <a href="https://www.instagram.com/fordbrasil/">
                    <img src="../assets/instagram.png" alt="Instagram">
                </a>

                <a href="https://www.youtube.com/fordbrasil">
                    <img src="../assets/youtube.png" alt="YouTube">
                </a>
            </div>

            <img class="logo-footer" src="../assets/ford-96.png" alt="Logo da Ford">

        </div>
    </footer>
</body>

</html>
